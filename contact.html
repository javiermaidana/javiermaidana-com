<form id="contact-form" action="https://formspree.io/f/xnjooqgn" method="POST">

  <input type="hidden" name="_subject" value="Message from javiermaidana.com" />
  <input type="text" name="_gotcha" style="display:none" />

  <div class="form-group">
    <label>Email *</label>
    <input type="email" name="email" placeholder="your@email.com" required />
  </div>

  <div class="form-group">
    <label>Want to talk with me? *</label>
    <textarea name="message" placeholder="Write your message here..." required></textarea>
  </div>

  <button type="submit" id="submit-btn">Send Message</button>

  <p id="form-success" style="display:none; color:green;">
    ✓ Message sent successfully
  </p>

  <p id="form-error" style="display:none; color:red;">
    Something went wrong. Try again.
  </p>

</form>
